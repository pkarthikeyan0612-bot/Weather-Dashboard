<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🌤 Weather Dashboard</h1>

        <div class="search-container">
            <input
                type="text"
                id="cityInput"
                placeholder="Enter city name..."
            >
            <button id="searchBtn">Search</button>
        </div>

        <div id="message"></div>

        <div id="weatherCard" class="weather-card hidden">

            <div class="header">
                <h2 id="cityName">City</h2>
                <img id="weatherIcon" src="" alt="Weather Icon">
            </div>

            <div class="weather-info">

                <div class="info-box">
                    <h3>🌡 Temperature</h3>
                    <p id="temperature">--°C</p>
                </div>

                <div class="info-box">
                    <h3>💧 Humidity</h3>
                    <p id="humidity">--%</p>
                </div>

                <div class="info-box">
                    <h3>🌬 Wind Speed</h3>
                    <p id="wind">-- m/s</p>
                </div>

                <div class="info-box">
                    <h3>☁ Condition</h3>
                    <p id="condition">---</p>
                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
